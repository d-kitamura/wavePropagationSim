<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wave Propagation Simulator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="stage">
      <div class="topbar">
        <div>
          <h1 data-i18n="title">Wave Propagation Simulator</h1>
          <p id="statusLine"></p>
        </div>
        <div class="transport">
          <button id="playPauseBtn" type="button" data-i18n="pause">Pause</button>
          <button id="stepBtn" type="button" data-i18n="step">Step</button>
          <button id="resetBtn" type="button" data-i18n="reset">Reset</button>
        </div>
      </div>
      <div class="fieldFrame">
        <canvas id="yAxisCanvas"></canvas>
        <div class="canvasShell">
          <canvas id="fieldCanvas"></canvas>
          <canvas id="overlayCanvas"></canvas>
        </div>
        <div class="axisCorner"></div>
        <canvas id="xAxisCanvas"></canvas>
      </div>
      <div class="legend">
        <span id="legendMin">-1.00</span>
        <div class="legendBar"></div>
        <span id="legendMax">1.00</span>
      </div>
    </section>

    <aside class="panel">
      <div class="section compact">
        <label><span data-i18n="language">Language</span>
          <select id="languageSelect"><option value="en">English</option><option value="ja">日本語</option></select>
        </label>
        <div class="segmented">
          <button id="sourceModeBtn" class="active" type="button" data-i18n="sourceMode">Source mode</button>
          <button id="probeModeBtn" type="button" data-i18n="probeMode">Probe mode</button>
        </div>
      </div>

      <div class="section grid2">
        <label><span data-i18n="display">Display</span>
          <select id="displayMode"><option value="instant">Instant pressure</option><option value="rms">RMS pressure</option><option value="spl">SPL</option></select>
        </label>
        <label><span data-i18n="colorScale">Color scale</span>
          <select id="colorScale"><option value="fixed" selected>Fixed</option><option value="auto">Auto</option></select>
        </label>
        <label><span data-i18n="fixedMin">Fixed min</span><input id="fixedMin" type="number" value="-1" step="0.1"></label>
        <label><span data-i18n="fixedMax">Fixed max</span><input id="fixedMax" type="number" value="1" step="0.1"></label>
        <label><span data-i18n="colormap">Color map</span>
          <select id="colormap"><option value="thermal" selected>Thermal</option><option value="diverging">Diverging</option><option value="viridis">Viridis</option></select>
        </label>
        <label class="check"><input id="contours" type="checkbox"><span data-i18n="contours">Contours / nodal lines</span></label>
      </div>

      <div class="section grid2">
        <label><span data-i18n="timeScale">Time scale</span><input id="timeScale" type="range" min="0.001" max="0.25" step="0.001" value="0.01"><b id="timeScaleValue">0.010x</b></label>
        <label><span data-i18n="attenuation">Attenuation</span>
          <select id="attenuation"><option value="none">None</option><option value="inverse">1 / r</option><option value="sqrt">1 / sqrt(r)</option></select>
        </label>
        <label><span data-i18n="soundSpeed">Sound speed [m/s]</span><input id="soundSpeed" type="number" value="340" min="1" step="1"></label>
        <label><span data-i18n="temperature">Temperature [C]</span><input id="temperature" type="number" value="14.4" step="0.1"></label>
      </div>

      <div class="section">
        <label><span data-i18n="preset">Preset</span>
          <select id="presetSelect">
            <option value="">Manual</option><option value="single">Single center source</option><option value="twoPhase">Two sources in phase</option><option value="twoOpposite">Two sources opposite phase</option><option value="quadrupole">Quadrupole</option><option value="verticalLine">Vertical line array</option><option value="horizontalLine">Horizontal line array</option><option value="beam">Beam steering</option><option value="grating">Grating lobes</option><option value="circular">Circular array</option><option value="random">Random phase array</option><option value="moving">Moving source</option>
          </select>
        </label>
        <div id="beamControls" class="beamControls hidden">
          <label><span data-i18n="beamAngle">Steering angle [deg]</span><input id="beamAngle" type="range" min="-75" max="75" step="1" value="25"><b id="beamAngleValue">25 deg</b></label>
          <label><span data-i18n="controlMode">Control</span><select id="beamControlMode"><option value="phase">Phase shift</option><option value="delay">Time delay</option></select></label>
        </div>
        <div id="movingControls" class="beamControls hidden">
          <label><span data-i18n="movingSpeed">Moving speed [m/s]</span><input id="movingSpeed" type="range" min="0.1" max="8" step="0.1" value="2.7"><b id="movingSpeedValue">2.7 m/s</b></label>
        </div>
      </div>

      <div class="section grid2">
        <label class="check"><input id="gridSnap" type="checkbox"><span data-i18n="gridSnap">Grid snap</span></label>
        <label><span data-i18n="snapStep">Snap step [m]</span><input id="snapStep" type="number" value="0.85" min="0.05" step="0.05"></label>
        <button id="randomizeBtn" type="button" data-i18n="randomize">Randomize phases</button>
        <button id="resetPhasesBtn" type="button" data-i18n="resetPhases">Reset phases</button>
      </div>

      <div class="section">
        <h2 data-i18n="selectedSource">Selected source</h2>
        <div id="selectedInfo" class="muted"></div>
        <div class="grid2">
          <label><span data-i18n="amplitude">Amplitude</span><input id="srcAmp" type="number" step="0.05" value="1"></label>
          <label><span data-i18n="frequency">Frequency [Hz]</span><input id="srcFreq" type="number" min="1" step="1" value="100"></label>
          <label><span data-i18n="wavelength">Wavelength [m]</span><input id="srcWave" type="number" min="0.01" step="0.01" value="3.40"></label>
          <label><span data-i18n="phaseUnit">Phase unit</span><select id="phaseUnit"><option value="rad">rad</option><option value="deg">degree</option></select></label>
          <label><span data-i18n="phase">Phase</span><input id="srcPhase" type="number" step="0.1" value="0"></label>
          <label><span data-i18n="delay">Delay [s]</span><input id="srcDelay" type="number" step="0.0001" value="0"></label>
          <label><span data-i18n="sourceControl">Control</span><select id="srcControl"><option value="phase">Phase</option><option value="delay">Delay</option></select></label>
        </div>
        <div class="actions"><button id="muteBtn" type="button" data-i18n="mute">Mute</button><button id="soloBtn" type="button" data-i18n="solo">Solo</button><button id="deleteBtn" type="button" data-i18n="delete">Delete</button></div>
      </div>

      <div class="section"><h2 data-i18n="sources">Sources</h2><div id="sourceList" class="sourceList"></div></div>
      <div class="section">
        <h2 data-i18n="probes">Observation</h2>
        <label><span data-i18n="audioVolume">Audio volume</span><input id="audioVolume" type="range" min="0" max="1" step="0.01" value="0.35"></label>
        <div id="audioStatus" class="muted">Audio stopped.</div>
        <canvas id="scopeCanvas" width="520" height="160"></canvas>
        <canvas id="spectrumCanvas" width="520" height="120"></canvas>
        <div id="probeTable" class="tableWrap"></div>
      </div>
    </aside>
  </main>
  <script src="app.js"></script>
</body>
</html>
